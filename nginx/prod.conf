map $http_x_forwarded_proto $portfolio_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

map $http_upgrade $portfolio_connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name portfolio.justdoeat.org localhost;

  resolver 127.0.0.11 valid=10s ipv6=off;
  include /etc/nginx/includes/active-upstream.conf;

  client_max_body_size 10m;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    proxy_pass http://$portfolio_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $portfolio_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $portfolio_connection_upgrade;
    proxy_read_timeout 60s;
  }
}
