x-app-env: &app-env
  APP_ENV: production
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}

x-app-base: &app-base
  build:
    context: .
    target: runner
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env
  environment: *app-env
  expose:
    - "3000"
  healthcheck:
    test:
      [
        "CMD-SHELL",
        'node -e "fetch(''http://127.0.0.1:3000/api/health?format=json'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
      ]
    interval: 10s
    timeout: 5s
    retries: 6
    start_period: 20s

services:
  postgres:
    image: postgres:17-alpine
    container_name: portfolio-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_prod}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - portfolio_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-portfolio_prod} -d ${POSTGRES_DB:-portfolio_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app_blue:
    <<: *app-base
    container_name: portfolio-prod-app-blue
    environment:
      <<: *app-env
      APP_COLOR: blue

  app_green:
    <<: *app-base
    container_name: portfolio-prod-app-green
    environment:
      <<: *app-env
      APP_COLOR: green

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-prod-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/active-upstream.conf:/etc/nginx/includes/active-upstream.conf:ro
    ports:
      - "127.0.0.1:3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    container_name: portfolio-prod-app
    profiles:
      - legacy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  portfolio_prod_postgres_data:
