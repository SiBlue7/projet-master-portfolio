name: CD Prod

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Deploy production
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on:
      - self-hosted
      - portfolio-prod
    timeout-minutes: 30
    environment:
      name: production
      url: https://portfolio.justdoeat.org

    steps:
      - name: Deploy on production VM
        run: |
          cd /opt/projet-master-portfolio/prod
          sh scripts/deploy-prod-blue-green.sh
