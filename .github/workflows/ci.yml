name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://portfolio:portfolio_password@localhost:5432/portfolio?schema=public
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-nextauth-secret-change-me-in-real-env
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: ci-admin-password

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build application
        run: pnpm build

  container:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg DATABASE_URL="$DATABASE_URL" -t projet-master-portfolio:ci .
